# sentry-cli configuration — used by upload_symbols.sh and CI.
# SENTRY_AUTH_TOKEN must be set as env var (never commit the real token).
# defaults.org is overridden by --org flag in upload_symbols.sh via $SENTRY_ORG env var;
# set it here only if you run sentry-cli locally without the script.
defaults.url=https://sentry.io/
defaults.org=YOUR_SENTRY_ORG_SLUG
defaults.project=crew-link
