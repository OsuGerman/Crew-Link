<!DOCTYPE html>
<html lang="de">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Crew Link — Konvoi-App Demo">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="crew_link">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Crew Link — iOS Preview</title>
  <link rel="manifest" href="manifest.json">

  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at top, #2a2c34 0%, #14151a 70%);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display',
                   'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
    }

    /* Flutter mountet in <body>. _PhoneFrame im Dart-Code constrainen den
       Content auf 393px Breite, zentriert in der Viewport. */

    /* Flutter setzt flt-glass-pane manchmal nicht auf width/height — dann
       rendert die Scene auf 0×0. Force-fill via CSS. */
    flutter-view, flt-glass-pane {
      display: block;
      position: absolute;
      inset: 0;
      width: 100% !important;
      height: 100% !important;
    }

    .stage-label {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      color: #c8c9cd;
      font-size: 12px;
      letter-spacing: 0.4px;
      opacity: 0.6;
      z-index: 100;
      pointer-events: none;
    }
    .stage-label strong { color: #fff; }
  </style>
</head>
<body>
  <div class="stage-label"><strong>Crew Link</strong> · iOS Web-Preview · 393 px column</div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
